site_name: AAAX
site_url: https://aaax.one
site_description: Advanced Autonomous Agentic ICS (Information and Computing Services).
site_author: Productive Superintelligence
repo_url: https://github.com/Productive-Superintelligence/aaax
repo_name: aaax
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/aaax-logo-black.png
  favicon: assets/aaax-logo-white.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/custom.css

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Productive-Superintelligence/aaax

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - architecture/index.md
    - Overview: architecture/overview.md
    - Kernel Functions: architecture/kernel-functions.md
    - Framework Boundaries: architecture/framework-boundaries.md
  - Core Reference:
    - core/index.md
    - Configuration: core/config.md
    - Governance: core/governance.md
    - Module Loading: core/modules.md
    - LibOS Bridge: core/libos.md
  - Tutorials:
    - tutorials/index.md
    - "1. First Kernel": tutorials/01-first-kernel.md
    - "2. Expose Public Channels": tutorials/02-expose-public-channels.md
  - API Reference:
    - reference/api.md
