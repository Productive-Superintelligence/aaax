name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install vendored frameworks and AAAX
        run: |
          python -m pip install --upgrade pip
          pip install -e ./sssn
          pip install -e ./lllm
          pip install --no-deps -e .
          pip install -r requirements.txt

      - name: Smoke test imports
        run: |
          python -c "
          import aaax
          from aaax import AAAXConfig, AAAXKernel, bootstrap_kernel
          print('AAAX imports OK', aaax.__version__)
          "

      - name: Run tests
        run: pytest aaax/tests -q

      - name: Build documentation
        env:
          NO_MKDOCS_2_WARNING: "true"
        run: python -m mkdocs build --strict

      - name: Build distributions
        run: python -m build
