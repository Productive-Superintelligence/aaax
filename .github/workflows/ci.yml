name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install AAAX
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke test imports
        run: |
          python -c "
          import aaax
          from aaax import Strategy, create_strategy_app
          print('AAAX imports OK', aaax.__version__)
          "

      - name: Run tests
        run: pytest -q

      - name: Build distributions
        run: python -m build
